openapi: 3.0.0
info:
  title: simple-api
  version: 0.1.0
  description: |
    Приложение "Теплый дом" позволяет управлять умными устройствами в вашем доме

servers:
  - url: https://warm-home.org

paths:
  /user/{id}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/User'

        '404':
          description: Объект не найден
      
    put:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/User'

        '201':
          description: Объект создан
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/User'

        '403':
          description: Создание объекта запрещено

    post:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/User'

        '201':
          description: Объект обновлен
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/User'

        '403':
          description: Обновление объекта запрещено
    
    delete:
      responses:
        '200':
          description: OK

        '403':
          description: Удаление объекта запрещено

  /house/{id}:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/House'

        '404':
          description: Объект не найден

    put:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/House'

        '201':
          description: Объект создан
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/House'

        '403':
          description: Создание объекта запрещено

    post:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/House'

        '201':
          description: Объект создан
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/House'

        '403':
          description: Создание объекта запрещено

    delete:
      responses:
        '200':
          description: OK

        '403':
          description: Удаление объекта запрещено

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string

    House:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        address:
          type: string